name: go-ci

on:
  pull_request:
    paths:
      - '**'
      - 'docs/api-contract.md'
      - 'docs/contract.json'
      - 'docs/deployment-matrix.md'
      - 'AGENTS.md'
      - '.github/workflows/go-ci.yml'
  push:
    branches: [main]
    paths:
      - '**'
      - 'docs/api-contract.md'
      - 'docs/contract.json'
      - 'docs/deployment-matrix.md'
      - 'AGENTS.md'
      - '.github/workflows/go-ci.yml'

jobs:
  vet-build:
    name: vet + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - run: go vet ./...
      - run: go build ./...

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - run: go test -count=1 ./...

  race:
    name: test -race
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - run: go test -race -count=1 ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          args: --timeout=5m

  contract:
    name: architecture contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - run: make contract-check
