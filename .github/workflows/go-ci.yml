name: go-ci

on:
  pull_request:
    paths:
      - '**'
      - 'docs/api-contract.md'
      - 'docs/contract.json'
      - 'docs/deployment-matrix.md'
      - 'AGENTS.md'
      - '.github/workflows/go-ci.yml'
  push:
    branches: [main]
    paths:
      - '**'
      - 'docs/api-contract.md'
      - 'docs/contract.json'
      - 'docs/deployment-matrix.md'
      - 'AGENTS.md'
      - '.github/workflows/go-ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vet-build:
    name: vet + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - run: go vet ./...
      - run: go build ./...

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - run: go test -count=1 ./...

  race:
    name: test -race
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - run: go test -race -count=1 ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          args: --timeout=5m

  contract:
    name: architecture contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - run: make contract-check

  vulnerabilities:
    name: reachable vulnerabilities
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...

  webui:
    name: webui lint + build + e2e + audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: webui/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: LEVARA_API_URL=http://127.0.0.1:8081 npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - name: Upload Playwright failure artifacts
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: webui-playwright-artifacts
          path: |
            webui/playwright-report
            webui/test-results
          if-no-files-found: ignore
          retention-days: 14
      - run: npm audit --omit=dev --audit-level=high

  memory-behavior:
    name: memory behavior eval
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Compile memory behavior eval
        run: python3 -m py_compile benchmark/memory_behavior_eval/run_memory_behavior_eval.py
      - name: Run deterministic memory behavior eval
        run: >
          python3 benchmark/memory_behavior_eval/run_memory_behavior_eval.py
          --fake
          --label ci
          --output "${RUNNER_TEMP}/memory_behavior_eval.json"
      - name: Upload memory behavior report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: memory-behavior-eval
          path: ${{ runner.temp }}/memory_behavior_eval.json
          if-no-files-found: error
          retention-days: 30

  compose:
    name: compose configuration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose -f docker-compose.yml config --quiet
      - run: docker compose -f docker-compose.qwen-stack.yml config --quiet
      - run: docker compose -f docker-compose.pi.yml config --quiet
      - run: docker compose -f docker-compose.yml -f docker-compose.qwen3.yml config --quiet
      - run: docker compose -f deploy/docker/docker-compose.yml config --quiet

  memory-auth-isolation:
    name: memory auth + owner isolation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Authenticated MCP and owner boundaries
        run: go test -count=1 ./internal/http ./pkg/mcp -run 'Auth|Owner|Isolation|APIKey|Session'
      - name: Durable memory job ownership
        run: go test -count=1 ./pkg/memoryindex ./pkg/mcp -run 'Outbox|RecoverRunning|DeleteMemory'
      - name: Race-check security boundaries
        run: go test -race -count=1 ./internal/http -run 'MCP.*Auth|MCP.*Session|Tenant.*Isolation'
