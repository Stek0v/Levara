basePath: /api/v1
definitions:
  http.CogneeSearchRequest:
    properties:
      collection:
        description: Filter search to one collection (empty = all)
        type: string
      cypher_query:
        description: Raw Cypher for CYPHER search type
        type: string
      domain:
        description: 'Optional: filter to collections tagged with this domain'
        type: string
      query_text:
        type: string
      query_type:
        description: CHUNKS, GRAPH_COMPLETION, etc.
        type: string
      rerank:
        description: 'Optional: rerank results via cross-encoder'
        type: boolean
      session_id:
        description: 'Conversational memory: load prior interactions'
        type: string
      tags:
        description: 'Optional: filter results by metadata tags'
        items:
          type: string
        type: array
      top_k:
        type: integer
    type: object
  http.DatasetDTO:
    properties:
      created_at:
        type: string
      id:
        type: string
      name:
        type: string
      owner_id:
        type: string
      record_count:
        type: integer
      updated_at:
        type: string
    type: object
  runreg.Status:
    properties:
      chunks_created:
        type: integer
      edges_extracted:
        type: integer
      elapsed_ms:
        type: integer
      entities_extracted:
        type: integer
      message:
        type: string
      pipeline_run_id:
        type: string
      stage:
        type: string
      started_at:
        type: string
      status:
        description: RUNNING, COMPLETED, FAILED
        type: string
    type: object
info:
  contact: {}
  description: |-
    Levara HNSW + BM25 + Neo4j vector DB HTTP API.
    See CLAUDE.md for architecture; pkg/mcp for the MCP alternate transport.
  title: Levara API
  version: v1
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      - application/x-www-form-urlencoded
      description: Accepts either form-encoded (Cognee frontend) or JSON body. On
        success returns a 24h HS256 JWT in the response + a secure http-only cookie.
      parameters:
      - description: email + password
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Missing credentials
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Invalid credentials
          schema:
            additionalProperties: true
            type: object
        "429":
          description: Rate-limited (shared bucket with /auth/register)
          schema:
            additionalProperties: true
            type: object
      summary: Exchange credentials for a JWT
      tags:
      - auth
  /auth/me:
    get:
      description: Validates the bearer token and returns the associated user record.
        Also the probe called by the WebUI auth guard on every dashboard mount (T1).
      produces:
      - application/json
      responses:
        "200":
          description: id, email, username
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthenticated
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Return the current user
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Bcrypt-hashes the password and issues a fresh JWT on success.
      parameters:
      - description: email + password
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Missing or malformed fields
          schema:
            additionalProperties: true
            type: object
        "409":
          description: Email already registered
          schema:
            additionalProperties: true
            type: object
        "429":
          description: Rate-limited (shared bucket with /auth/login)
          schema:
            additionalProperties: true
            type: object
      summary: Create a user account
      tags:
      - auth
  /cognify:
    post:
      consumes:
      - application/json
      description: Transforms text into chunks + embeddings + (optional) graph. Body
        may provide inline texts[] or reference datasets[] whose raw files are loaded
        from disk. rag mode skips graph extraction.
      parameters:
      - description: datasets | datasetIds | texts, optional llm_model, collection,
          session_id
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: status + pipeline_run_id
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: no texts to cognify
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Start a cognify pipeline run
      tags:
      - cognify
  /cognify/{runId}/status:
    get:
      parameters:
      - description: Run ID returned by POST /cognify
        in: path
        name: runId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/runreg.Status'
        "404":
          description: run not found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Poll the status of a cognify run
      tags:
      - cognify
  /cognify/{runId}/stream:
    get:
      description: Emits event:progress updates every 500ms while the run is RUNNING,
        then event:done with the terminal payload. Client should disconnect after
        the done event.
      parameters:
      - description: Run ID returned by POST /cognify
        in: path
        name: runId
        required: true
        type: string
      produces:
      - text/event-stream
      responses:
        "200":
          description: SSE stream
          schema:
            type: string
        "404":
          description: run not found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Stream cognify progress via Server-Sent Events
      tags:
      - cognify
  /datasets:
    get:
      description: Returns datasets owned by the caller plus any explicitly shared.
        Superusers see all rows.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/http.DatasetDTO'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List datasets visible to the caller
      tags:
      - datasets
    post:
      consumes:
      - application/json
      parameters:
      - description: Dataset name
        in: body
        name: body
        required: true
        schema:
          properties:
            name:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/http.DatasetDTO'
        "400":
          description: name required
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Create a new dataset
      tags:
      - datasets
  /datasets/{id}:
    delete:
      parameters:
      - description: Dataset UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: boolean
            type: object
      security:
      - BearerAuth: []
      summary: Delete a dataset (idempotent)
      tags:
      - datasets
  /prune/data:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: superuser role required
          schema:
            additionalProperties: true
            type: object
        "500":
          description: SQL error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Wipe all datasets and their data (superuser-only)
      tags:
      - admin
  /prune/system:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: superuser role required
          schema:
            additionalProperties: true
            type: object
        "500":
          description: SQL error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Wipe datasets + graph (superuser-only)
      tags:
      - admin
  /search:
    post:
      consumes:
      - application/json
      description: query_type selects the strategy. AUTO routes via the adaptive router;
        explicit values pin a strategy. CHUNKS/HYBRID/BM25/TEMPORAL/RAG_COMPLETION/SUMMARIES
        are vector-side; GRAPH_COMPLETION, CYPHER, NATURAL_LANGUAGE, TRIPLET_COMPLETION,
        CODE, COMMUNITY_LOCAL/GLOBAL, GRAPH_COMPLETION_CONTEXT_EXTENSION/COT are graph-side.
      parameters:
      - description: Query + options
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/http.CogneeSearchRequest'
      produces:
      - application/json
      responses:
        "200":
          description: strategy-dependent shape; always includes search_type
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Unified search entry point
      tags:
      - search
  /search/text:
    post:
      consumes:
      - application/json
      description: query_type selects the strategy. AUTO routes via the adaptive router;
        explicit values pin a strategy. CHUNKS/HYBRID/BM25/TEMPORAL/RAG_COMPLETION/SUMMARIES
        are vector-side; GRAPH_COMPLETION, CYPHER, NATURAL_LANGUAGE, TRIPLET_COMPLETION,
        CODE, COMMUNITY_LOCAL/GLOBAL, GRAPH_COMPLETION_CONTEXT_EXTENSION/COT are graph-side.
      parameters:
      - description: Query + options
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/http.CogneeSearchRequest'
      produces:
      - application/json
      responses:
        "200":
          description: strategy-dependent shape; always includes search_type
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Unified search entry point
      tags:
      - search
schemes:
- http
- https
securityDefinitions:
  BearerAuth:
    description: '"Bearer <jwt>" from POST /auth/login or an API key from POST /auth/keys.'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
