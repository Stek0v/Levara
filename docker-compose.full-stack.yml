services:
  cognee:
    build:
      context: ./cognee
      dockerfile: Dockerfile
    ports:
      - "8002:8000"
    environment:
      - HOST=0.0.0.0
      - ENVIRONMENT=local
      - LOG_LEVEL=INFO
      - DEBUG=false
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-*}
      # LLM → llama.cpp on GPU server
      - LLM_API_KEY=${LLM_API_KEY:-no-key}
      - LLM_MODEL=${LLM_MODEL:-qwen}
      - LLM_PROVIDER=${LLM_PROVIDER:-llama_cpp}
      - LLM_ENDPOINT=${LLM_ENDPOINT:-http://10.23.0.64:9004/v1}
      - LLM_API_VERSION=${LLM_API_VERSION:-}
      # Embedding → embed-server on GPU server
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-openai/text-embedding-3-small}
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-openai}
      - EMBEDDING_ENDPOINT=${EMBEDDING_ENDPOINT:-http://10.23.0.64:9001/v1}
      - EMBEDDING_DIMENSIONS=${EMBEDDING_DIMENSIONS:-1024}
      # PostgreSQL
      - DB_PROVIDER=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB:-cognee_db}
      - DB_USERNAME=${POSTGRES_USER:-cognee}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-cognee}
      # Neo4j
      - GRAPH_DATABASE_PROVIDER=neo4j
      - GRAPH_DATABASE_URL=bolt://neo4j:7687
      - GRAPH_DATABASE_NAME=neo4j
      - GRAPH_DATABASE_USERNAME=neo4j
      - GRAPH_DATABASE_PASSWORD=${NEO4J_PASSWORD:-pleaseletmein}
      - GRAPH_DATASET_DATABASE_HANDLER=neo4j_aura_dev
      # VectraDB
      - VECTOR_DB_PROVIDER=vectradb
      - VECTOR_DB_URL=http://vectradb:8080
      - VECTOR_DB_KEY=${VECTOR_DB_KEY:-}
      # Redis
      - REDIS_URL=redis://redis:6379
      # Rate Limiting
      - LLM_RATE_LIMIT_ENABLED=${LLM_RATE_LIMIT_ENABLED:-true}
      - LLM_RATE_LIMIT_REQUESTS=${LLM_RATE_LIMIT_REQUESTS:-60}
      - LLM_RATE_LIMIT_INTERVAL=${LLM_RATE_LIMIT_INTERVAL:-60}
      # Security
      - REQUIRE_AUTHENTICATION=${REQUIRE_AUTHENTICATION:-false}
      - ENABLE_BACKEND_ACCESS_CONTROL=${ENABLE_BACKEND_ACCESS_CONTROL:-false}
      - ACCEPT_LOCAL_FILE_PATH=${ACCEPT_LOCAL_FILE_PATH:-true}
      - ALLOW_HTTP_REQUESTS=${ALLOW_HTTP_REQUESTS:-true}
      - ALLOW_CYPHER_QUERY=${ALLOW_CYPHER_QUERY:-true}
      # Monitoring
      - LITELLM_LOG=${LITELLM_LOG:-ERROR}
      - TELEMETRY_DISABLED=${TELEMETRY_DISABLED:-0}
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
      vectradb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - cognee-network
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 8GB

  vectradb:
    build: ./VectraDB
    ports:
      - "8080:8080"
    volumes:
      - vectradb-data:/app/data
    command: ["./vectradb", "-bootstrap=true", "-dim=${VECTRADB_DIM:-${EMBEDDING_DIMENSIONS:-1024}}", "-shards=${VECTRADB_SHARDS:-3}", "-port=8080"]
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/metrics"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - cognee-network

  postgres:
    image: pgvector/pgvector:pg17
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cognee}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cognee}
      POSTGRES_DB: ${POSTGRES_DB:-cognee_db}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cognee} -d ${POSTGRES_DB:-cognee_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cognee-network

  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-pleaseletmein}
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-pleaseletmein}", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - cognee-network

  redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - cognee-network

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    depends_on:
      vectradb:
        condition: service_healthy
    networks:
      - cognee-network

networks:
  cognee-network:
    name: cognee-fullstack-network

volumes:
  vectradb-data:
  postgres-data:
  neo4j-data:
  redis-data:
