services:
  cognevra:
    build: ./Cognevra
    ports:
      - "8080:8080"
      - "50051:50051"
    volumes:
      - cognevra-data:/app/data
    command: ["./cognevra", "-standalone=true", "-dim=${COGNEVRA_DIM:-${EMBEDDING_DIMENSIONS:-1024}}", "-shards=${COGNEVRA_SHARDS:-3}", "-port=8080", "-grpc-port=50051", "-hnsw-m=${HNSW_M:-20}", "-hnsw-ef-mult=${HNSW_EF_MULT:-10}", "-hnsw-ef-min=${HNSW_EF_MIN:-64}"]
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/metrics"]
      interval: 10s
      timeout: 5s
      retries: 3

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    depends_on:
      - cognevra

volumes:
  cognevra-data:
