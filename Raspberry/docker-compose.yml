version: "3.8"

services:
  levara:
    build:
      context: ..
      dockerfile: Raspberry/Dockerfile
    container_name: levara-pi
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - levara-data:/data
    env_file:
      - levara.env
    environment:
      - EMBEDDING_ENDPOINT=http://host.docker.internal:11434/v1/embeddings
      - LLM_ENDPOINT=http://host.docker.internal:11434/v1
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "3.0"
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  levara-data:
    driver: local
