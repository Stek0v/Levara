      <text x="0" y="74" fill="#17202A" font-size="66" font-weight="760" letter-spacing="-2.8">Levara</text>
      <text x="0" y="132" fill="#17202A" font-size="37" font-weight="620" letter-spacing="-1.2">Контекст, который</text>
      <text x="0" y="177" fill="#17202A" font-size="37" font-weight="620" letter-spacing="-1.2">переживает сессию.</text>
      <text x="0" y="226" fill="#5B6570" font-size="20">Сохраняйте решения. Ищите знания проекта.</text>
      <text x="0" y="255" fill="#5B6570" font-size="20">Продолжайте проверенную работу без пересказа чата.</text>

      <g transform="translate(0 298)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14">
