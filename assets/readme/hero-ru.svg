<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400" role="img" aria-labelledby="title desc">
  <title id="title">Levara — контекст, который переживает сессию</title>
  <desc id="desc">Светлая редакционная обложка на основе проектной карты памяти Levara room × hall.</desc>

  <rect width="1200" height="400" rx="28" fill="#F4F1E9"/>
  <rect x="1" y="1" width="1198" height="398" rx="27" fill="none" stroke="#D3CEC1" stroke-width="2"/>

  <defs>
