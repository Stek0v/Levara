        <text x="30" y="0" fill="#59636E">помнить</text>
        <path d="M104 -5H136" stroke="#A29B8D"/>
        <text x="152" y="0" fill="#2658D8">02</text>
        <text x="182" y="0" fill="#59636E">проверить</text>
