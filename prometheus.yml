global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.rules.yml

scrape_configs:
  - job_name: levara
    static_configs:
      - targets: ['levara:8080']
    metrics_path: /metrics

  - job_name: cognee
    static_configs:
      - targets: ['cognee:8000']
    metrics_path: /health
    scrape_interval: 30s
