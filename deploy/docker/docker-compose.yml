version: '3.8'

services:
  levara:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    ports:
      - "8080:8080"
      - "50051:50051"
    volumes:
      - levara-data:/app/data
    environment:
      - DB_PROVIDER=sqlite
      - VECTOR_DIM=768
      - HTTP_PORT=8080
      - GRPC_PORT=50051
      - MCP_ENABLED=true
      - RERANK_ENDPOINT=${RERANK_ENDPOINT:-}
      - RERANK_MODEL=${RERANK_MODEL:-mmini-L12-int8}
      - RERANK_BUDGET_MS=${RERANK_BUDGET_MS:-1500}
    restart: unless-stopped

  rerank:
    profiles: ["rerank"]
    build:
      context: ../rerank
      dockerfile: Dockerfile
    ports:
      - "9100:9100"
    volumes:
      - ${RERANK_MODEL_HOST_DIR:-/models/mmini-L12-int8}:/models/mmini-L12-int8:ro
    environment:
      - RERANK_MODEL_DIR=/models/mmini-L12-int8
      - RERANK_MODEL_FILE=model_quantized.onnx
      - OMP_NUM_THREADS=${OMP_NUM_THREADS:-4}
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ../../prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    restart: unless-stopped

volumes:
  levara-data:
  prometheus-data:
